<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #e2eafc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .dashboard-box {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    h1 {
      color: #333;
    }

    p {
      color: #666;
    }
    button {
  margin-top: 20px;
  padding: 10px 20px;
  background: #dc3545;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #c82333;
}
button {
  margin-top: 20px;
  padding: 10px 20px;
  background: #dc3545;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #c82333;
}


  </style>
</head>

<script>
  function logout() {
    localStorage.removeItem("isLoggedIn");
    window.location.href = "login.html";
  }
</script>

<body>
  <div class="dashboard-box">
  <h1 id="welcome"></h1>
  <p>Login berhasil! Ini halaman utama kamu.</p>
  <button onclick="logout()">Logout</button>
</div>

  
<script>
  if (localStorage.getItem("isLoggedIn") !== "true") {
    alert("Akses ditolak. Silakan login dulu.");
    window.location.href = "login.html";
  }
</script>
<script>
  const username = localStorage.getItem("username");

  if (localStorage.getItem("isLoggedIn") !== "true") {
    alert("Akses ditolak. Silakan login dulu.");
    window.location.href = "login.html";
  }

  document.getElementById("welcome").textContent = `Selamat datang, ${username} 🎉`;

  function logout() {
    localStorage.removeItem("isLoggedIn");
    localStorage.removeItem("username");
    window.location.href = "login.html";
  }
</script>


</body>
</html>
